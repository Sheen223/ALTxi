<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALTXI — Match Report</title>
  <link rel="stylesheet" href="index.css?v=10" />
  <link rel="stylesheet" href="post-match.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0e14'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' dominant-baseline='central' font-family='sans-serif' font-weight='900' font-size='14' fill='%23c8ff00'%3EAX%3C/text%3E%3C/svg%3E" />
</head>
<body class="page-postmatch">

  <div class="postmatch-bg"></div>

  <nav class="navbar scrolled" id="navbar">
    <a href="index.html" class="navbar__logo">
      <span class="navbar__logo-text">ALT<span>X</span>I</span>
    </a>

    <div class="navbar__actions">
      <!-- User profile stub -->
      <div class="navbar__profile" style="display: flex;">
        <div class="navbar__avatar">0x</div>
        <span class="navbar__wallet" id="nav-wallet-address">Connecting...</span>
      </div>
    </div>
  </nav>

  <main class="postmatch-container">
    <header class="postmatch-header">
      <h1 class="postmatch-title">FULL TIME</h1>
      <p class="postmatch-subtitle">Alternate Reality Timeline Secured</p>
    </header>

    <section class="postmatch-scorecard">
      <div class="scorecard-team">
        <h2 id="pm-home-name">HOME</h2>
      </div>
      <div class="scorecard-score">
        <span id="pm-home-score">2</span>
        <span class="scorecard-divider">-</span>
        <span id="pm-away-score">1</span>
      </div>
      <div class="scorecard-team">
        <h2 id="pm-away-name">AWAY</h2>
      </div>
    </section>

    <div class="postmatch-columns">
      
      <!-- Tactical Breakdown -->
      <section class="postmatch-tactics">
        <h3>Tactical Overview</h3>
        <ul class="tactics-list">
          <li><span class="tactic-label">Formation:</span> <span id="pm-formation" class="tactic-val">4-3-3</span></li>
          <li><span class="tactic-label">Mentality:</span> <span id="pm-mentality" class="tactic-val">Attacking</span></li>
          <li><span class="tactic-label">Captain:</span> <span id="pm-captain" class="tactic-val">Messi</span></li>
        </ul>
        
        <div class="tactics-analysis" id="pm-analysis">
          <p>Awaiting tactical analysis from the Oracle Engine...</p>
        </div>
      </section>



    </div>

  </main>

  <script src="index.js?v=10"></script>
</body>
</html>
